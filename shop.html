<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | SkinHonestly</title>
    <style>
        :root {
            --dark-green: #3D4A3D;
            --light-tan: #DCCFB7;
            --cream: #FAF7F2;
            --text-dark: #2B2B2B;
            --white: #FFFFFF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', sans-serif; }
        body { background-color: var(--cream); color: var(--text-dark); line-height: 1.6; }

        /* FEATURE SECTION (As seen in u9epF EHIF.jpg) */
        .hero-feature { background-color: var(--dark-green); color: var(--white); padding: 4rem 5%; display: flex; align-items: center; gap: 4rem; }
        .hero-content { flex: 1; }
        .hero-image { flex: 1; text-align: center; }

        /* THREE PILLAR FEATURES */
        .three-pillars { display: flex; gap: 0; }
        .pillar { flex: 1; padding: 3rem 2rem; text-align: center; }
        .pillar:nth-child(1) { background-color: var(--cream); }
        .pillar:nth-child(2) { background-color: var(--light-tan); }
        .pillar:nth-child(3) { background-color: #C9A876; color: white; }

        /* CONTENT BLOCK */
        .content-block { background-color: var(--dark-green); color: white; padding: 4rem 5%; display: flex; align-items: center; gap: 4rem; }

        /* NEWSLETTER FOOTER */
        .footer-newsletter { background: var(--cream); padding: 4rem 5%; text-align: center; border-top: 1px solid #eee; }
        .footer-newsletter input { padding: 12px; border: 1px solid #ccc; border-radius: 4px; width: 300px; }
        .btn { padding: 12px 25px; border-radius: 4px; font-weight: bold; border: none; cursor: pointer; background: var(--dark-green); color: white; }
    </style>
</head>
<body>

    <!-- HERO FEATURE -->
    <section class="hero-feature">
        <div class="hero-content">
            <h1>Organic Cosmetic<br>Natural Brand</h1>
            <p>Our flagship serum, refined for purity and results.</p>
        </div>
        <div class="hero-image">
            <img src="https://images.unsplash.com/photo-1620916566398-39f1143ab7be?w=600" style="border-radius: 8px;">
        </div>
    </section>

    <!-- THREE PILLARS -->
    <section class="three-pillars">
        <div class="pillar"><h3>Organic Ingredients</h3></div>
        <div class="pillar"><h3>Eco-Friendly</h3></div>
        <div class="pillar"><h3>Cruelty-Free</h3></div>
    </section>

    <!-- CONTENT BLOCK -->
    <section class="content-block">
        <div>
            <h2>Eco-Friendly Landing Brand</h2>
            <p>Transparency is our promise. From earth to face.</p>
        </div>
        <img src="https://images.unsplash.com/photo-1598440947619-2c35fc95c088?w=400" style="border-radius: 8px;">
    </section>

    <!-- NEWSLETTER AT FOOTER -->
    <section class="footer-newsletter">
        <h3>Join our Newsletter</h3>
        <form>
            <input type="email" placeholder="Your email address" required>
            <button type="submit" class="btn">Subscribe</button>
        </form>
    </section>

</body>
</html>
