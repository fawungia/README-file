<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Curated Skincare | SkinHonestly - Clinical & Clean</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@400;600&display=swap');
        :root { --bg: #FAF7F2; --primary: #5E795B; --secondary: #D4886B; --text: #2B2B2B; --white: #FFFFFF; --border: #EAE6DF; --highlight: #C9A876; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; }
        a { text-decoration: none; color: inherit; transition: 0.3s; }
        img { max-width: 100%; height: auto; display: block; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; font-weight: 600; line-height: 1.2; }

        header { background-color: var(--white); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .nav-container { display: flex; justify-content: space-between; align-items: center; padding: 0 5%; max-width: 1400px; margin: 0 auto; height: 70px; }
        .logo { font-size: 1.6rem; font-weight: bold; color: var(--primary); font-family: 'Playfair Display', serif; }
        .nav-links { display: flex; gap: 2.5rem; align-items: center; }
        .nav-links a { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #666; }
        .menu-toggle { display: none; font-size: 1.5rem; cursor: pointer; color: var(--primary); }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .nav-links { display: none; flex-direction: column; position: absolute; top: 70px; left: 0; width: 100%; background: white; padding: 2rem; border-bottom: 1px solid var(--border); gap: 1.5rem; }
            .nav-links.active { display: flex; }
        }

        .shop-hero { padding: 4rem 5% 3rem; text-align: center; background: var(--white); }
        .container { max-width: 1400px; margin: 0 auto; padding: 4rem 5%; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 3rem; }
        .product-card { background: var(--white); border-radius: 8px; overflow: hidden; border: 1px solid transparent; transition: 0.4s; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.06); }
        .product-card img { width: 100%; height: 350px; object-fit: cover; }
        .product-info { padding: 2rem; text-align: center; }
        .btn-outline { display: block; padding: 1rem; border: 1px solid var(--primary); color: var(--primary); font-weight: bold; border-radius: 4px; margin-top: 1rem; }
    </style>
</head>
<body>
    <header>
        <nav class="nav-container">
            <a href="index.html" class="logo">SkinHonestly</a>
            <div class="menu-toggle" id="mobile-toggle">☰</div> 
            <div class="nav-links" id="nav-menu">
                <a href="index.html">Home</a>
                <a href="shop.html" class="active">Shop</a>
                <a href="blog.html">The Journal</a>
                <a href="about.html">About</a>
            </div>
        </nav>
    </header>

    <section class="shop-hero">
        <h1>SkinHonestly Shop</h1>
        <p>Expertly curated skincare, merging our clinical line with trusted favorites.</p>
    </section>

    <main class="container">
        <div class="product-grid">
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1556228578-0d85b1a4d571?q=80&w=600" alt="Cleanser">
                <div class="product-info">
                    <h3>Gentle Hydrating Cleanser</h3>
                    <a href="https://amzn.to/3SNLKhW" target="_blank" class="btn-outline">Shop at Amazon</a>
                </div>
            </div>
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1620916566398-39f1143ab7be?q=80&w=800" alt="Serum">
                <div class="product-info">
                    <h3>The Daily Reset Serum</h3>
                    <a href="https://amzn.to/4p58tlL" target="_blank" class="btn-outline" style="background: var(--primary); color: white;">Shop Exclusive — $42</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        const mobileToggle = document.getElementById('mobile-toggle');
        const navMenu = document.getElementById('nav-menu');
        mobileToggle.addEventListener('click', () => { navMenu.classList.toggle('active'); });
    </script>
</body>
</html>
