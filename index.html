<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkinHonestly | Honest Skincare, Real Results</title>
    <!-- Keep all existing meta, GTM, and canonical tags -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-33SX49MXHN"></script>
    <script>window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-33SX49MXHN');</script>

    <style>
        :root {
            --bg: #FAF7F2; --text: #1a1a1a; --primary: #4a5d4a; 
            --accent: #d4a373; --white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        
        /* Typography */
        h1, h2 { font-family: 'Fraunces', serif; font-weight: 600; line-height: 1.1; }
        .container { max-width: 1100px; margin: 0 auto; padding: 6rem 2rem; }

        /* Luxury Header */
        header { padding: 2rem 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(250, 247, 242, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; }

        /* Premium Hero */
        .hero { text-align: center; padding: 4rem 2rem; }
        .hero h1 { font-size: clamp(3rem, 8vw, 5rem); margin-bottom: 2rem; }
        .btn { padding: 1.2rem 2.5rem; border-radius: 50px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; border: none; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: transparent; border: 1px solid var(--text); }

        /* Modern Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 3rem; }
        .card { background: white; padding: 3rem; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); text-align: center; }

        /* Newsletter (Premium) */
        .newsletter { background: var(--primary); color: white; padding: 5rem; border-radius: 40px; text-align: center; }
        input { padding: 1.2rem; border-radius: 50px; border: none; width: 300px; margin-right: 1rem; }

        @media (max-width: 768px) { .nav-links { display: none; } }
    </style>
</head>
<body>

<header>
    <div class="logo">SkinHonestly</div>
    <nav class="nav-links">
        <a href="index.html">Home</a><a href="shop.html">Shop</a><a href="blog.html">Blog</a>
    </nav>
</header>

<main>
    <section class="hero">
        <h1>Honest Skincare.<br>Real Results.</h1>
        <p>Transparent ingredients, science-backed routines.</p>
        <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
            <button class="btn btn-primary">Shop Collection</button>
            <button class="btn btn-secondary">Read the Blog</button>
        </div>
    </section>

    <section class="container">
        <div class="grid">
            <div class="card"><h3>Science-Backed</h3></div>
            <div class="card"><h3>Cruelty-Free</h3></div>
            <div class="card"><h3>Honest Reviews</h3></div>
        </div>
    </section>

    <section class="container">
        <div class="newsletter">
            <h2 style="color: white; font-size: 2.5rem;">Unlock Your Best Skin</h2>
            <form action="https://manage.kmail-lists.com/subscriptions/subscribe" method="POST" target="_blank">
                <input type="hidden" name="g" value="WpSSkZ">
                <input type="email" name="email" placeholder="Enter your email" required>
                <button type="submit" class="btn" style="background: var(--accent); color: white;">Subscribe</button>
            </form>
        </div>
    </section>
</main>

<div id="email-popup-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:white; padding: 4rem; border-radius: 40px; text-align: center;">
        <button id="close-popup" style="background:none; border:none; cursor:pointer;">&times;</button>
        <h2>Don't leave without your glow!</h2>
    </div>
</div>

<script>
    const popup = document.getElementById('email-popup-overlay');
    document.addEventListener('mouseleave', () => { popup.style.display = 'flex'; });
    document.getElementById('close-popup').addEventListener('click', () => { popup.style.display = 'none'; });
</script>

</body>
</html>
