<section style="text-align: center; padding: 4rem 5%; background: var(--white); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);">
    <h2 style="font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 1rem; color: var(--primary);">Join the SkinHonestly Community</h2>
    <p style="margin-bottom: 2.5rem; color: var(--text-light); max-width: 600px; margin-left: auto; margin-right: auto;">Clinical skincare advice and exclusive editorial drops delivered to your inbox.</p>

    <form action="https://manage.kmail-lists.com/subscriptions/subscribe" method="POST" target="_blank" style="display: flex; justify-content: center; gap: 15px; max-width: 500px; margin: 0 auto;">
        <input type="hidden" name="g" value="WpSSkZ">
        <input type="email" name="email" placeholder="Your email address" required style="padding: 1rem 1.5rem; border: 1px solid var(--border); border-radius: 4px; flex-grow: 1; font-family: 'Inter', sans-serif;">
        <button type="submit" style="padding: 1rem 2.5rem; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; transition: transform 0.3s ease;">Subscribe</button>
    </form>
</section>
