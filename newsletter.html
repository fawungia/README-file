<section style="text-align: center; padding: 2rem; background: #fff;">

    <p style="margin-bottom: 1rem;">Daily tips, honest reviews, and skincare secrets.</p>

    <!-- Updated Klaviyo Action URL -->
    <form action="https://manage.klaviyo.com/subscriptions/subscribe" method="POST" target="_blank" style="display: flex; justify-content: center; gap: 10px;">
        
        <!-- Hidden field to route to your specific Klaviyo list -->
        <input type="hidden" name="g" value="Y7jZq9">
        
        <!-- Changed name="email_address" to name="email" so Klaviyo recognizes it -->

        <button type="submit" style="padding: 0.8rem 1.5rem; background: #7A9B76; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Subscribe</button>
    </form>
